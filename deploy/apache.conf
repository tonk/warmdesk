# Apache configuration for Coworker
# Requires modules: proxy, proxy_http, proxy_wstunnel, ssl, headers, rewrite
# Enable with: sudo a2enmod proxy proxy_http proxy_wstunnel ssl headers rewrite
#
# Place this file in /etc/apache2/sites-available/coworker.conf
# then: sudo a2ensite coworker && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName yourdomain.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName yourdomain.com

    # SSL — obtain a certificate with: certbot --apache -d yourdomain.com
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin"

    # Proxy to Coworker backend
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # WebSocket support (real-time board updates and chat)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:8080/$1 [P,L]

    # Forward client IP
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/coworker-error.log
    CustomLog ${APACHE_LOG_DIR}/coworker-access.log combined
</VirtualHost>

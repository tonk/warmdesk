name: Build macOS (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS universal DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build universal DMG
        run: cd frontend && npm run tauri:build -- --bundles dmg --target universal-apple-darwin

      - name: Collect artifact
        run: |
          SHA=$(git rev-parse --short HEAD)
          SRC=$(ls frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$SRC" "WarmDesk-dev-${SHA}-universal.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarmDesk-macos
          path: WarmDesk-dev-*-universal.dmg

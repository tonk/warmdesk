name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend assets
        run: |
          mkdir -p dist/web
          cp -r frontend/dist/. dist/web/

      - name: Build backend
        run: |
          mkdir -p dist
          cd backend
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../dist/coworker .

      - name: Assemble distribution
        run: |
          cp coworker.yaml.example dist/coworker.yaml.example
          cp -r deploy dist/deploy
          cp INSTALL.md dist/INSTALL.md
          cp README.md dist/README.md

      - name: Create archive
        run: |
          tar -czf coworker-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: coworker-${{ github.ref_name }}.tar.gz
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Server binary + web frontend tarball ────────────────────────────────────
  release-server:
    name: Build server binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend assets
        run: |
          mkdir -p dist/web
          cp -r frontend/dist/. dist/web/

      - name: Build backend
        run: |
          mkdir -p dist
          cd backend
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../dist/coworker .
          go build -ldflags="-s -w" -o ../dist/coworker-seed ./cmd/seed

      - name: Assemble distribution
        run: |
          cp coworker.yaml.example dist/coworker.yaml.example
          cp -r deploy dist/deploy
          cp INSTALL.md dist/INSTALL.md
          cp README.md dist/README.md

      - name: Create archive
        run: tar -czf coworker-${{ github.ref_name }}.tar.gz -C dist .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: coworker-${{ github.ref_name }}.tar.gz
          generate_release_notes: true

  # ── Tauri desktop clients ────────────────────────────────────────────────────
  release-desktop:
    name: Build desktop client (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            bundle: appimage
            artifact: "Coworker-*-x86_64.AppImage"
            rename: "Coworker-${{ github.ref_name }}-x86_64.AppImage"

          - name: Windows
            os: windows-latest
            bundle: nsis
            artifact: "Coworker_*_x64-setup.exe"
            rename: "Coworker-${{ github.ref_name }}-x64-setup.exe"

          - name: macOS
            os: macos-latest
            bundle: dmg
            artifact: "Coworker_*.dmg"
            rename: "Coworker-${{ github.ref_name }}-universal.dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build desktop app (Linux)
        if: matrix.os == 'ubuntu-22.04'
        # NO_STRIP=true: linuxdeploy's bundled strip is too old for newer glibc.
        # The Rust release profile already strips the binary.
        run: cd frontend && NO_STRIP=true npm run tauri:build -- --bundles appimage

      - name: Build desktop app (Windows)
        if: matrix.os == 'windows-latest'
        run: cd frontend && npm run tauri:build -- --bundles nsis

      - name: Build desktop app (macOS universal)
        if: matrix.os == 'macos-latest'
        # Build a universal binary covering both Intel and Apple Silicon.
        run: cd frontend && npm run tauri:build -- --bundles dmg --target universal-apple-darwin

      - name: Collect and rename artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          SRC=$(ls frontend/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$SRC" "Coworker-${{ github.ref_name }}-x86_64.AppImage"

      - name: Collect and rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = Get-ChildItem frontend/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $src.FullName "Coworker-${{ github.ref_name }}-x64-setup.exe"

      - name: Collect and rename artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          SRC=$(ls frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$SRC" "Coworker-${{ github.ref_name }}-universal.dmg"

      - name: Upload to GitHub Release (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: Coworker-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload to GitHub Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: Coworker-${{ github.ref_name }}-x64-setup.exe

      - name: Upload to GitHub Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: Coworker-${{ github.ref_name }}-universal.dmg

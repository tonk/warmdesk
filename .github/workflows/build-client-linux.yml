name: Build client Linux (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build
        # NO_STRIP=true: linuxdeploy's bundled strip is too old for newer glibc.
        # The Rust release profile already strips the binary.
        run: cd frontend && NO_STRIP=true npm run tauri:build -- --bundles appimage

      - name: Collect artifact
        run: |
          SHA=$(git rev-parse --short HEAD)
          SRC=$(ls frontend/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$SRC" "WarmDesk-dev-${SHA}-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarmDesk-linux
          path: WarmDesk-dev-*-x86_64.AppImage

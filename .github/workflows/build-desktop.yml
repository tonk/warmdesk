name: Build desktop (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    name: Build desktop client (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            bundle: appimage
            artifact: "WarmDesk-*-x86_64.AppImage"

          - name: Windows
            os: windows-latest
            bundle: nsis
            artifact: "WarmDesk_*_x64-setup.exe"

          - name: macOS
            os: macos-latest
            bundle: dmg
            artifact: "WarmDesk_*.dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build desktop app (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: cd frontend && NO_STRIP=true npm run tauri:build -- --bundles appimage

      - name: Build desktop app (Windows)
        if: matrix.os == 'windows-latest'
        run: cd frontend && npm run tauri:build -- --bundles nsis

      - name: Build desktop app (macOS universal)
        if: matrix.os == 'macos-latest'
        run: cd frontend && npm run tauri:build -- --bundles dmg --target universal-apple-darwin

      - name: Collect artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          SHA=$(git rev-parse --short HEAD)
          SRC=$(ls frontend/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$SRC" "WarmDesk-dev-${SHA}-x86_64.AppImage"

      - name: Collect artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sha = (git rev-parse --short HEAD).Trim()
          $installer = Get-ChildItem frontend/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $installer.FullName "WarmDesk-dev-$sha-x64-setup.exe"
          Compress-Archive -Path "frontend/src-tauri/target/release/WarmDesk.exe" -DestinationPath "WarmDesk-dev-$sha-x64-portable.zip"

      - name: Collect artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          SHA=$(git rev-parse --short HEAD)
          SRC=$(ls frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$SRC" "WarmDesk-dev-${SHA}-universal.dmg"

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: WarmDesk-linux
          path: WarmDesk-dev-*-x86_64.AppImage

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: WarmDesk-windows
          path: |
            WarmDesk-dev-*-x64-setup.exe
            WarmDesk-dev-*-x64-portable.zip

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: WarmDesk-macos
          path: WarmDesk-dev-*-universal.dmg
